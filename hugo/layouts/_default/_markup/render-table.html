<div class="content-wrapper">
<table>
  {{ with .THead }}
  <thead>
    {{ range . }}
    <tr>
      {{ range . }}
      <th>{{ .Text }}</th>
      {{ end }}
    </tr>
    {{ end }}
  </thead>
  {{ end }}

  <tbody>
    {{ range .TBody }}
    <tr>
      {{ range . }}
      <td>{{ .Text }}</td>
      {{ end }}
    </tr>
    {{ end }}
  </tbody>
</table>
</div>
